<html lang="en">

<title>NYPD Sergeant Exam Study Guide</title>
<link rel="manifest" href="manifest.json">
<link rel="preload" href="data.js?v=20260412" as="fetch" crossorigin>

<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html { -webkit-text-size-adjust: 100%; }
body { -webkit-tap-highlight-color: transparent; }

:root {
  --fg: #000000;
  --bg: #FFFFFF;
  --bg-hover: #f8f8f8;
  --bg-muted: #f4f4f4;
  --bg-selected: #e0e0e0;
  --fg-muted: #999;
  --rule: 2px solid var(--fg);
  --rule-thin: 1px solid var(--fg);
  --rule-muted: 1px solid var(--bg-selected);
  --font-display: 'Playfair Display', Georgia, serif;
  --font-body: 'Source Serif 4', 'Georgia', serif;
  --font-mono: 'JetBrains Mono', monospace;
  --sidebar-w: 300px;
  --font-scale: 1;
  --transition: 0.25s ease;
}
html.dark {
  --fg: #e8e8e8;
  --bg: #111111;
  --bg-hover: #1a1a1a;
  --bg-muted: #1e1e1e;
  --bg-selected: #333;
  --fg-muted: #888;
}
html { font-size: calc(16px * var(--font-scale)); }
body {
  font-family: var(--font-body);
  font-weight: 400;
  color: var(--fg);
  background: var(--bg);
  line-height: 1.7;
  -webkit-font-smoothing: antialiased;
  height: 100vh;
  overflow: hidden;
}

/* ── Layout ── */
#app { display: flex; height: 100vh; }

/* ── Sidebar ── */
#sidebar {
  width: var(--sidebar-w);
  min-width: var(--sidebar-w);
  background: var(--fg);
  color: var(--bg);
  display: flex;
  flex-direction: column;
  position: fixed;
  top: 0; left: 0; bottom: 0;
  z-index: 100;
  overflow-y: auto;
  transition: transform 0.2s ease;
}
#sidebar-header {
  padding: 2rem 1.5rem 1.5rem;
  border-bottom: 1px solid rgba(128,128,128,0.3);
}
#sidebar-header h1 {
  font-family: var(--font-display);
  font-weight: 900;
  font-size: 1.1rem;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  line-height: 1.3;
}
#sidebar-header p {
  font-family: var(--font-mono);
  font-size: 0.65rem;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  margin-top: 0.5rem;
  opacity: 0.5;
}
.nav-section {
  padding: 1rem 0;
  border-bottom: 1px solid rgba(128,128,128,0.15);
}
.nav-section-title {
  font-family: var(--font-mono);
  font-size: 0.6rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  padding: 0 1.5rem;
  margin-bottom: 0.5rem;
  opacity: 0.4;
}
.nav-item {
  display: flex;
  align-items: center;
  padding: 0.4rem 1.5rem;
  font-family: var(--font-body);
  font-size: 0.85rem;
  font-weight: 400;
  color: var(--bg);
  text-decoration: none;
  cursor: pointer;
  border: none;
  background: none;
  width: 100%;
  text-align: left;
  transition: background 0.1s, color 0.1s;
  gap: 0.4rem;
}
.nav-item:hover, .nav-item.active { background: var(--bg); color: var(--fg); }
.nav-item .nav-num { font-family: var(--font-mono); font-size: 0.7rem; opacity: 0.5; min-width: 2rem; }
.nav-item.active .nav-num { opacity: 1; }
.nav-item .nav-title { flex: 1; }
.nav-item .q-badge { font-family: var(--font-mono); font-size: 0.6rem; opacity: 0.4; }
.nav-item:hover .q-badge, .nav-item.active .q-badge { opacity: 0.7; }
.nav-item .ch-check { font-size: 0.7rem; opacity: 0.5; margin-right: 0.2rem; }
.nav-item .ch-check.done { opacity: 1; }

/* ── Main ── */
#main {
  flex: 1;
  margin-left: var(--sidebar-w);
  height: 100vh;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch; /* iOS smooth scrolling */
}

/* ── Topbar ── */
#topbar {
  position: sticky; top: 0;
  background: var(--bg);
  border-bottom: var(--rule);
  padding: calc(0.75rem + env(safe-area-inset-top, 0)) 2rem 0.75rem;
  display: flex; align-items: center; gap: 0.75rem;
  z-index: 50; flex-wrap: wrap;
  padding-top: max(0.75rem, env(safe-area-inset-top, 0.75rem));
}
#menu-toggle {
  display: none; background: none; border: var(--rule); color: var(--fg);
  padding: 0.5rem 0.8rem; font-family: var(--font-mono); font-size: 0.8rem; cursor: pointer;
  min-height: 44px; min-width: 44px;
}
#menu-toggle:hover { background: var(--fg); color: var(--bg); }
.tab-bar { display: flex; gap: 0; }
.tab {
  font-family: var(--font-mono); font-size: 0.7rem; letter-spacing: 0.1em;
  text-transform: uppercase; padding: 0.5rem 1.2rem;
  border: var(--rule); border-right: none;
  background: var(--bg); color: var(--fg); cursor: pointer;
  transition: background 0.1s, color 0.1s;
}
.tab:last-child { border-right: var(--rule); }
.tab:hover { background: var(--bg-muted); }
.tab.active { background: var(--fg); color: var(--bg); }
.topbar-spacer { flex: 1; }
.topbar-controls { display: flex; gap: 0.3rem; align-items: center; }
.icon-btn {
  background: none; border: var(--rule-thin); color: var(--fg);
  padding: 0.3rem 0.5rem; font-family: var(--font-mono); font-size: 0.7rem;
  cursor: pointer; transition: background 0.1s, color 0.1s; line-height: 1;
}
.icon-btn:hover { background: var(--fg); color: var(--bg); }

/* ── Breadcrumbs ── */
#breadcrumbs {
  font-family: var(--font-mono); font-size: 0.6rem; letter-spacing: 0.1em;
  text-transform: uppercase; opacity: 0.5; padding: 0.5rem 2.5rem 0;
}
#breadcrumbs span { cursor: pointer; }
#breadcrumbs span:hover { text-decoration: underline; }

/* ── Content ── */
#content {
  padding: 2.5rem; max-width: 900px;
  opacity: 1; transition: opacity var(--transition);
}
#content.fading { opacity: 0; }

/* ── Typography ── */
#content h1 { font-family: var(--font-display); font-weight: 900; font-size: 2.2rem; line-height: 1.15; margin-bottom: 0.5rem; letter-spacing: -0.02em; }
#content h2 { font-family: var(--font-display); font-weight: 700; font-size: 1.4rem; margin-top: 2.5rem; margin-bottom: 0.75rem; padding-bottom: 0.4rem; border-bottom: var(--rule); }
#content h3 { font-family: var(--font-display); font-weight: 700; font-size: 1.1rem; margin-top: 1.8rem; margin-bottom: 0.5rem; }
#content h4 { font-family: var(--font-display); font-weight: 700; font-size: 1rem; margin-top: 1.2rem; margin-bottom: 0.4rem; }
#content p { margin-bottom: 1rem; }
#content ul, #content ol { margin: 0 0 1rem 1.5rem; }
#content li { margin-bottom: 0.4rem; line-height: 1.6; }
#content strong { font-weight: 600; }
#content hr { border: none; border-top: var(--rule); margin: 2rem 0; }
#content table { width: 100%; border-collapse: collapse; margin: 1rem 0 1.5rem; font-size: 0.92rem; }
#content th { font-family: var(--font-mono); font-size: 0.7rem; letter-spacing: 0.1em; text-transform: uppercase; text-align: left; padding: 0.7rem 0.9rem; border-bottom: var(--rule); background: var(--fg); color: var(--bg); }
#content td { padding: 0.6rem 0.9rem; border-bottom: var(--rule-muted); vertical-align: top; line-height: 1.5; }
#content tbody tr:nth-child(even) td { background: var(--bg-muted); }
#content tr:hover td { background: var(--bg-hover); }

/* ── Reading progress bar ── */
#reading-progress {
  position: fixed; top: 0; left: 0; height: 3px;
  background: var(--fg); width: 0%; z-index: 1001;
  transition: width 0.1s;
}

/* ── TOC (in-chapter) ── */
.chapter-toc {
  border: var(--rule-thin); padding: 1rem 1.5rem; margin: 1.5rem 0;
  font-size: 0.85rem;
}
.chapter-toc.sticky {
  position: sticky; top: 60px;
  max-height: calc(100vh - 80px); overflow-y: auto;
  background: var(--bg); z-index: 10;
}
.chapter-toc-title { font-family: var(--font-mono); font-size: 0.6rem; letter-spacing: 0.15em; text-transform: uppercase; opacity: 0.5; margin-bottom: 0.5rem; }
.chapter-toc a { color: var(--fg); text-decoration: none; display: block; padding: 0.2rem 0; }
.chapter-toc a:hover { text-decoration: underline; }
.chapter-toc a.indent { padding-left: 1rem; font-size: 0.8rem; opacity: 0.7; }

/* ── Progress ring ── */
.progress-ring {
  width: 20px; height: 20px;
}
.progress-ring-circle {
  transition: stroke-dasharray 0.3s;
}

/* ── Callout boxes ── */
.callout-base {
  padding: 1rem 1.2rem; margin: 1.5rem 0; font-size: 0.95rem;
  line-height: 1.65; border-left: 5px solid var(--fg); border-radius: 0 4px 4px 0;
}
.callout-base::before {
  display: block; font-family: var(--font-mono); font-size: 0.6rem; font-weight: 500;
  letter-spacing: 0.2em; text-transform: uppercase;
  margin-bottom: 0.6rem; padding-bottom: 0.5rem;
}
.callout-base strong { font-weight: 600; }

.callout-sergeant {
  border: 3px solid var(--fg); border-left: 5px solid var(--fg);
  background: var(--fg); color: var(--bg);
  padding: 1rem 1.2rem; margin: 1.5rem 0; font-size: 0.95rem;
  line-height: 1.65; border-radius: 0 4px 4px 0;
}
.callout-sergeant::before {
  content: '\2605  SERGEANT FOCUS'; display: block;
  font-family: var(--font-mono); font-size: 0.6rem; font-weight: 500;
  letter-spacing: 0.2em; text-transform: uppercase;
  margin-bottom: 0.6rem; padding-bottom: 0.5rem;
  border-bottom: 1px solid rgba(128,128,128,0.4);
}
.callout-sergeant strong { font-weight: 600; color: #5dade2; }

.callout-exam {
  border: 1px solid #c4a000; border-left: 5px solid #c4a000;
  padding: 1rem 1.2rem; margin: 1.5rem 0;
  font-size: 0.95rem; line-height: 1.65; background: #fffde6;
  border-radius: 0 4px 4px 0;
}
.callout-exam::before {
  content: '\26A0  EXAM ALERT'; display: block; color: #8a7000;
  font-family: var(--font-mono); font-size: 0.6rem; font-weight: 500;
  letter-spacing: 0.2em; text-transform: uppercase;
  margin-bottom: 0.6rem; padding-bottom: 0.5rem; border-bottom: 1px solid #e0d080;
}
.callout-exam strong { font-weight: 600; }
html.dark .callout-exam { background: #1c1a0e; border-color: #7a6a00; }
html.dark .callout-exam::before { color: #c4a000; border-bottom-color: #4a4000; }

.callout-memory {
  border: 1px solid #2e7d32; border-left: 5px solid #2e7d32;
  padding: 1rem 1.2rem; margin: 1.5rem 0;
  font-size: 0.95rem; line-height: 1.65; background: #e8f5e9;
  border-radius: 0 4px 4px 0;
}
.callout-memory::before {
  content: '\1F9E0  MEMORY AID'; display: block; color: #1b5e20;
  font-family: var(--font-mono); font-size: 0.6rem; font-weight: 500;
  letter-spacing: 0.2em; text-transform: uppercase;
  margin-bottom: 0.6rem; padding-bottom: 0.5rem; border-bottom: 1px solid #a5d6a7;
}
.callout-memory strong { font-weight: 600; }
html.dark .callout-memory { background: #0e1a0e; border-color: #2e7d32; }
html.dark .callout-memory::before { color: #66bb6a; border-bottom-color: #1b5e20; }

.callout-prior {
  border: 1px solid #1565c0; border-left: 5px solid #1565c0;
  padding: 1rem 1.2rem; margin: 1.5rem 0;
  font-size: 0.95rem; line-height: 1.65; background: #e3f2fd;
  border-radius: 0 4px 4px 0;
}
.callout-prior::before {
  content: '\1F4CB  PRIOR TEST'; display: block; color: #0d47a1;
  font-family: var(--font-mono); font-size: 0.6rem; font-weight: 500;
  letter-spacing: 0.2em; text-transform: uppercase;
  margin-bottom: 0.6rem; padding-bottom: 0.5rem; border-bottom: 1px solid #90caf9;
}
.callout-prior strong { font-weight: 600; }
html.dark .callout-prior { background: #0e131a; border-color: #1565c0; }
html.dark .callout-prior::before { color: #64b5f6; border-bottom-color: #0d47a1; }

.callout-conflict {
  border: 1px solid #c62828; border-left: 5px solid #c62828;
  padding: 1rem 1.2rem; margin: 1.5rem 0;
  font-size: 0.95rem; line-height: 1.65; background: #ffebee;
  border-radius: 0 4px 4px 0;
}
.callout-conflict::before {
  content: '\26D4  PG CONFLICT'; display: block; color: #b71c1c;
  font-family: var(--font-mono); font-size: 0.6rem; font-weight: 500;
  letter-spacing: 0.2em; text-transform: uppercase;
  margin-bottom: 0.6rem; padding-bottom: 0.5rem; border-bottom: 1px solid #ef9a9a;
}
.callout-conflict strong { font-weight: 600; }
html.dark .callout-conflict { background: #1a0e0e; border-color: #c62828; }
html.dark .callout-conflict::before { color: #ef5350; border-bottom-color: #b71c1c; }

.callout-seealso {
  border: 1px solid #6a1b9a; border-left: 5px solid #6a1b9a;
  padding: 0.75rem 1.2rem; margin: 1rem 0;
  font-size: 0.9rem; line-height: 1.5; background: #f3e5f5;
  border-radius: 0 4px 4px 0;
}
.callout-seealso::before {
  content: '\1F517  SEE ALSO'; display: block; color: #4a148c;
  font-family: var(--font-mono); font-size: 0.55rem; font-weight: 500;
  letter-spacing: 0.2em; text-transform: uppercase;
  margin-bottom: 0.4rem; padding-bottom: 0.3rem; border-bottom: 1px solid #ce93d8;
}
.callout-seealso strong { font-weight: 600; }
html.dark .callout-seealso { background: #160e1a; border-color: #6a1b9a; }
html.dark .callout-seealso::before { color: #ba68c8; border-bottom-color: #4a148c; }

/* ── Quiz ── */
.quiz-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 1rem; padding-bottom: 1rem; border-bottom: var(--rule); flex-wrap: wrap; gap: 0.5rem; }
.quiz-header h1 { margin-bottom: 0; }
.quiz-stats { font-family: var(--font-mono); font-size: 0.75rem; text-align: right; }
.quiz-toolbar { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; flex-wrap: wrap; align-items: center; }
.filter-btn { font-family: var(--font-mono); font-size: 0.6rem; letter-spacing: 0.08em; text-transform: uppercase; padding: 0.35rem 0.8rem; border: var(--rule-thin); background: var(--bg); color: var(--fg); cursor: pointer; }
.filter-btn:hover { background: var(--bg-muted); }
.filter-btn.active { background: var(--fg); color: var(--bg); }

.question-card { border: var(--rule); padding: 1.5rem; margin-bottom: 1.5rem; position: relative; }
.question-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 0.5rem; }
.question-num { font-family: var(--font-mono); font-size: 0.65rem; letter-spacing: 0.15em; text-transform: uppercase; opacity: 0.5; }
.q-time { font-family: var(--font-mono); font-size: 0.55rem; opacity: 0.3; margin-left: 0.5rem; }
.bookmark-btn { background: none; border: none; font-size: 1rem; cursor: pointer; opacity: 0.25; transition: opacity 0.15s; padding: 0 0.2rem; color: var(--fg); }
.bookmark-btn:hover { opacity: 0.6; }
.bookmark-btn.flagged { opacity: 1; }
.question-text { font-family: var(--font-display); font-weight: 700; font-size: 1.05rem; line-height: 1.4; margin-bottom: 1rem; }
.option { display: block; width: 100%; text-align: left; font-family: var(--font-body); font-size: 0.9rem; padding: 0.6rem 1rem; border: var(--rule-thin); border-bottom: none; background: var(--bg); color: var(--fg); cursor: pointer; transition: background 0.1s, color 0.1s; }
.option:last-of-type { border-bottom: var(--rule-thin); }
.option:hover:not(.selected):not(.correct):not(.wrong) { background: var(--fg); color: var(--bg); }
.option.selected { background: var(--bg-selected); }
.option.correct { background: var(--fg); color: var(--bg); }
.option.wrong { color: var(--fg-muted); text-decoration: line-through; }
.explanation { margin-top: 1rem; padding: 1rem; border-left: 4px solid var(--fg); font-size: 0.85rem; line-height: 1.5; display: none; }
.explanation.visible { display: block; }
.explanation .answer-label { font-family: var(--font-mono); font-size: 0.65rem; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 0.3rem; }
.open-answer-toggle { font-family: var(--font-mono); font-size: 0.7rem; letter-spacing: 0.1em; text-transform: uppercase; padding: 0.5rem 1rem; border: var(--rule); background: var(--bg); color: var(--fg); cursor: pointer; margin-top: 0.5rem; }
.open-answer-toggle:hover { background: var(--fg); color: var(--bg); }

/* ── Exam ── */
.exam-controls { display: flex; gap: 1rem; align-items: center; margin-bottom: 2rem; padding-bottom: 1rem; border-bottom: var(--rule); flex-wrap: wrap; }
.exam-timer { font-family: var(--font-mono); font-size: 1.5rem; font-weight: 500; }
.btn { font-family: var(--font-mono); font-size: 0.7rem; letter-spacing: 0.1em; text-transform: uppercase; padding: 0.6rem 1.5rem; border: var(--rule); background: var(--bg); color: var(--fg); cursor: pointer; transition: background 0.1s, color 0.1s; }
.btn:hover { background: var(--fg); color: var(--bg); }
.btn:disabled { opacity: 0.3; cursor: default; }
.btn:disabled:hover { background: var(--bg); color: var(--fg); }
.btn.primary { background: var(--fg); color: var(--bg); }
.btn.primary:hover { background: var(--bg); color: var(--fg); }

/* ── Jump grid ── */
.jump-grid { display: flex; flex-wrap: wrap; gap: 4px; margin: 1rem 0; }
.jump-cell {
  width: 28px; height: 28px; border: var(--rule-thin);
  font-family: var(--font-mono); font-size: 0.6rem;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: background 0.1s;
}
.jump-cell:hover { background: var(--bg-muted); }
.jump-cell.answered { background: var(--bg-selected); }
.jump-cell.current { background: var(--fg); color: var(--bg); }

/* ── Score ── */
.score-card { border: var(--rule); padding: 2rem; text-align: center; }
.score-num { font-family: var(--font-display); font-weight: 900; font-size: 4rem; line-height: 1; }
.score-label { font-family: var(--font-mono); font-size: 0.7rem; letter-spacing: 0.15em; text-transform: uppercase; margin-top: 0.5rem; }
.progress-track { width: 100%; height: 4px; background: var(--bg-selected); margin: 0.5rem 0; }
.progress-fill { height: 100%; background: var(--fg); transition: width 0.3s; }

/* ── Readiness ── */
.readiness-ring {
  width: 140px; height: 140px; position: relative; margin: 0 auto;
}
.readiness-ring svg { transform: rotate(-90deg); }
.readiness-ring .ring-text {
  position: absolute; inset: 0; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
}
.readiness-ring .ring-num { font-family: var(--font-display); font-weight: 900; font-size: 2.2rem; line-height: 1; }
.readiness-ring .ring-label { font-family: var(--font-mono); font-size: 0.55rem; letter-spacing: 0.15em; text-transform: uppercase; opacity: 0.5; }

/* ── Trend chart ── */
.trend-chart { margin: 1.5rem 0; }
.trend-chart svg { width: 100%; max-height: 120px; }
.trend-chart .axis-label { font-family: var(--font-mono); font-size: 9px; fill: var(--fg-muted); }
.trend-chart .trend-line { fill: none; stroke: var(--fg); stroke-width: 2; }
.trend-chart .trend-dot { fill: var(--fg); }

/* ── History ── */
.history-row { display: flex; align-items: center; padding: 0.6rem 0; border-bottom: var(--rule-muted); gap: 1rem; font-size: 0.85rem; }
.history-date { font-family: var(--font-mono); font-size: 0.7rem; opacity: 0.5; min-width: 7rem; }
.history-score { font-family: var(--font-display); font-weight: 900; font-size: 1.2rem; min-width: 3rem; }
.history-bar { flex: 1; height: 6px; background: var(--bg-selected); }
.history-bar-fill { height: 100%; background: var(--fg); }

/* ── Weak areas ── */
.weak-card { border: var(--rule-thin); padding: 1rem; margin-bottom: 0.5rem; display: flex; align-items: center; gap: 1rem; cursor: pointer; }
.weak-card:hover { background: var(--bg-muted); }
.weak-pct { font-family: var(--font-display); font-weight: 900; font-size: 1.5rem; min-width: 3.5rem; text-align: right; }
.weak-info { flex: 1; }
.weak-title { font-weight: 600; font-size: 0.9rem; }
.weak-detail { font-family: var(--font-mono); font-size: 0.65rem; opacity: 0.5; margin-top: 0.15rem; }

/* ── Flashcard ── */

  let examHistory = JSON.parse(localStorage.getItem('nypd_exam_history') || '[]');
  if (!Array.isArray(examHistory)) examHistory = [];
  let bookmarks = JSON.parse(localStorage.getItem('nypd_bookmarks') || '{}');
  let chaptersRead = JSON.parse(localStorage.getItem('nypd_chapters_read') || '{}');
  let studyLog = JSON.parse(localStorage.getItem('nypd_study_log') || '{}');
  let recentChapters = JSON.parse(localStorage.getItem('nypd_recent') || '[]');
  if (!Array.isArray(recentChapters)) recentChapters = [];
  let timeTrack = JSON.parse(localStorage.getItem('nypd_time') || '{}');

  function save(k, v) { localStorage.setItem(k, JSON.stringify(v)); }
  function saveAll() {
    save('nypd_progress', progress); save('nypd_prefs', prefs);
    save('nypd_exam_history', examHistory); save('nypd_bookmarks', bookmarks);
    save('nypd_chapters_read', chaptersRead); save('nypd_study_log', studyLog);
    save('nypd_recent', recentChapters); save('nypd_time', timeTrack);
  }

  // ── View state ──
  let currentView = 'home', currentChapter = null, currentTab = 'study';
  let quizFilter = 'all', quizShuffle = false;
  let chapterOpenTime = null;

  // ── Study log / streaks ──
  function logStudy() {
    const today = new Date().toISOString().slice(0, 10);
    studyLog[today] = (studyLog[today] || 0) + 1;
    save('nypd_study_log', studyLog);
  }
  function getStreak() {
    let streak = 0;
    const d = new Date();
    while (true) {
      const key = d.toISOString().slice(0, 10);
      if (studyLog[key]) { streak++; d.setDate(d.getDate() - 1); }
      else break;
    }
    return streak;
  }
  function getTodayCount() { return studyLog[new Date().toISOString().slice(0, 10)] || 0; }

  // ── Time tracking ──
  function startTimeTrack(chId) {
    if (chapterOpenTime && currentChapter) {
      const elapsed = Math.floor((Date.now() - chapterOpenTime) / 1000);
      if (elapsed > 5) {
        timeTrack[currentChapter.id] = (timeTrack[currentChapter.id] || 0) + elapsed;
        save('nypd_time', timeTrack);
      }
    }
    chapterOpenTime = Date.now();
  }

  // ── Prefs ──
  function applyPrefs() {
    document.documentElement.classList.toggle('dark', prefs.dark);
    document.documentElement.style.setProperty('--font-scale', prefs.fontScale);
    const btn = document.getElementById('dark-toggle');
    if (btn) btn.textContent = prefs.dark ? 'LIGHT' : 'DARK';
  }
  // Auto-detect system dark mode preference
  if (!localStorage.getItem('nypd_prefs') && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    prefs.dark = true;
  }
  applyPrefs();
  buildChapterJump();
  initSwipeGestures();

  // ── Nav build ──
  function buildNav() {
    $$('.nav-item[data-id]', navEl).forEach(el => el.remove());
    D.chapters.forEach(ch => {
      const btn = document.createElement('button');
      btn.className = 'nav-item'; btn.dataset.id = ch.id;
      const mc = ch.questions.filter(q => q.type === 'mc').length;
      const isRead = chaptersRead[ch.id];
      const pct = getChapterProgress(ch.id);
      const progressIcon = pct > 0 ? progressRingSvg(pct) : `<span class="ch-check ${isRead?'done':''}">${isRead?'\u2713':'\u25CB'}</span>`;
      btn.innerHTML = `${progressIcon}<span class="nav-num">${ch.sectionNum}</span><span class="nav-title">${ch.title}</span>${mc?`<span class="q-badge">${mc}Q</span>`:''}`;
      btn.onclick = () => { nav('chapter/' + ch.id); closeMobile(); };
      navEl.appendChild(btn);
    });
  }
  buildNav();

  function setActiveNav(id, view) {
    $$('.nav-item.active').forEach(n => n.classList.remove('active'));
    if (id) { const el = $(`.nav-item[data-id="${id}"]`); if (el) el.classList.add('active'); }
    else if (view) { const el = $(`.nav-item[data-view="${view}"]`); if (el) el.classList.add('active'); }
    // Bottom nav
    $$('#bottom-nav .bnav-btn').forEach(b => b.classList.remove('active'));
    if (view) { const b = $(`#bottom-nav .bnav-btn[onclick*="'${view}'"]`); if (b) b.classList.add('active'); }
  }

  function toggleSidebar() { $('#sidebar').classList.toggle('open'); $('#overlay').classList.toggle('visible'); }
  function closeMobile() { $('#sidebar').classList.remove('open'); $('#overlay').classList.remove('visible'); }
  document.getElementById('overlay').addEventListener('click', toggleSidebar);

  function adjustFont(d) { prefs.fontScale = Math.max(0.75, Math.min(1.5, prefs.fontScale + d * 0.1)); save('nypd_prefs', prefs); applyPrefs(); }
  function toggleDark() { prefs.dark = !prefs.dark; save('nypd_prefs', prefs); applyPrefs(); }

  // ── Reading progress bar ──
  let tickingProgress = false;
  function updateReadingProgress() {
    if (!tickingProgress) {
      window.requestAnimationFrame(() => {
        const el = document.getElementById('reading-progress');
        if (!el) return;
        const main = document.getElementById('main');
        const scrollTop = main.scrollTop;
        const scrollHeight = main.scrollHeight - main.clientHeight;
        const progress = scrollHeight > 0 ? (scrollTop / scrollHeight) * 100 : 0;
        el.style.width = progress + '%';
        tickingProgress = false;
      });
      tickingProgress = true;
    }
  }
  document.getElementById('main').addEventListener('scroll', updateReadingProgress, { passive: true });

  // ── Chapter jump dropdown ──
  function buildChapterJump() {
    const select = document.getElementById('chapter-jump');
    if (!select) return;
    select.innerHTML = '<option value="">Jump to chapter...</option>' +
      D.chapters.map(ch => `<option value="${ch.id}">${ch.sectionNum} — ${ch.title}</option>`).join('');
  }
  function jumpToChapter(id) {
    if (id) { nav('chapter/' + id); document.getElementById('chapter-jump').value = ''; }
  }

  // ── Progress ring SVG ──
  function progressRingSvg(pct) {
    const r = 8, c = 2 * Math.PI * r, dash = (pct / 100) * c;
    const color = pct >= 80 ? '#2e7d32' : pct >= 50 ? '#c4a000' : '#999';
    return `<svg class="progress-ring" viewBox="0 0 20 20"><circle cx="10" cy="10" r="${r}" fill="none" stroke="var(--bg-selected)" stroke-width="2"/><circle class="progress-ring-circle" cx="10" cy="10" r="${r}" fill="none" stroke="${color}" stroke-width="2" stroke-dasharray="${dash} ${c - dash}" stroke-linecap="round" transform="rotate(-90 10 10)"/></svg>`;
  }
  function getChapterProgress(chId) {
    const s = progress[`quiz_${chId}`];
    if (!s?.answers) return 0;
    const a = Object.values(s.answers);
    const t = a.length, c = a.filter(x => x.correct).length;
    return t > 0 ? Math.round(c / t * 100) : 0;
  }

  // ── Swipe gestures ──
  let touchStartX = 0, touchStartY = 0;
  function initSwipeGestures() {
    content.addEventListener('touchstart', e => {
      touchStartX = e.touches[0].clientX;
      touchStartY = e.touches[0].clientY;
    }, { passive: true });
    content.addEventListener('touchend', e => {
      if (!currentChapter) return;
      const diffX = touchStartX - e.changedTouches[0].clientX;
      const diffY = touchStartY - e.changedTouches[0].clientY;
      if (Math.abs(diffX) > 50 && Math.abs(diffX) > Math.abs(diffY)) {
        const idx = D.chapters.indexOf(currentChapter);
        if (diffX > 0 && idx < D.chapters.length - 1) nav('chapter/' + D.chapters[idx + 1].id);
        else if (diffX < 0 && idx > 0) nav('chapter/' + D.chapters[idx - 1].id);
      }
    }, { passive: true });
  }

  // ── Context-aware bottom nav ──
  function showContextBottomNav(prevCh, nextCh) {
    const bottomNav = document.getElementById('bottom-nav');
    if (!bottomNav) return;
    bottomNav.innerHTML = `<div class="bnav-items">
      <button class="bnav-btn" onclick="App.nav('chapter/${prevCh?.id || ''})" ${!prevCh?'disabled':''}>&#8592; PREV</button>
      <button class="bnav-btn" onclick="App.scrollToTOC()">&#8679; CONTENTS</button>
      <button class="bnav-btn" onclick="App.nav('chapter/${nextCh?.id || ''})" ${!nextCh?'disabled':''}>NEXT &#8594;</button>
    </div>`;
  }
  function restoreStandardBottomNav() {
    const bottomNav = document.getElementById('bottom-nav');
    if (!bottomNav) return;
    bottomNav.innerHTML = `<div class="bnav-items">
      <button class="bnav-btn" onclick="App.nav('home')" title="Home">HOME</button>
      <button class="bnav-btn" onclick="App.nav('cheatsheet')" title="Cheat Sheet">CHEAT</button>
      <button class="bnav-btn icon-only" onclick="App.openSearch()" title="Search">&#128269;</button>
      <button class="bnav-btn" onclick="App.nav('quickquiz')" title="Quick Quiz">QUIZ</button>
      <button class="bnav-btn" onclick="App.nav('exam')" title="Practice Exam">EXAM</button>
    </div>`;
  }
  function scrollToTOC() {
    const toc = document.querySelector('.chapter-toc.sticky');
    if (toc) toc.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  // ── Transitions ──
  function fadeIn(renderFn) {
    content.classList.add('fading');
    setTimeout(() => { renderFn(); content.classList.remove('fading'); }, 120);
  }
  function scrollTop() {
    const main = document.getElementById('main');
    if (main) main.scrollTo({ top: 0, behavior: 'instant' });
  }

  // ── Breadcrumbs ──
  function setBreadcrumbs(...parts) {
    bcEl.innerHTML = parts.map((p, i) => {
      if (p.action) return `<span onclick="${p.action}">${p.label}</span>`;
      return `<span>${p.label}</span>`;
    }).join(' \u203A ');
  }

  // ── URL routing ──
  function nav(route) {
    location.hash = route;
  }
  function handleRoute() {
    const hash = location.hash.slice(1) || 'home';
    const parts = hash.split('/');
    const view = parts[0];

    startTimeTrack(null);

    if (view === 'chapter' && parts[1]) {
      const ch = D.chapters.find(c => c.id === parts[1]);
      if (ch) {
        const tab = parts[2] || 'study';
        showChapter(ch.id, tab);
        return;
      }
    }
    currentChapter = null;
    currentView = view;
    setActiveNav(null, view);
    // Hide chapter jump and restore standard bottom nav
    const jumpSelect = document.getElementById('chapter-jump');
    if (jumpSelect) jumpSelect.style.display = 'none';
    restoreStandardBottomNav();

    fadeIn(() => {
      scrollTop();
      if (view === 'home') showHome();
      else if (view === 'cheatsheet') showCheatSheet();
      else if (view === 'flashcards') showFlashcards();
      else if (view === 'exam') showExam();
      else if (view === 'weak') showWeakAreas();
      else if (view === 'sergeant') showSergeantFocus();
      else if (view === 'settings') showSettings();
      else if (view === 'quickquiz') showQuickQuiz();
      else showHome();
    });
  }
  window.addEventListener('hashchange', handleRoute);

  // ── Markdown ──
  function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  function renderMd(md) {
    if (!md) return '';
    const codeBlocks = [];
    let html = md.replace(/```(\w*)\n([\s\S]*?)```/g, (_, lang, code) => {
      codeBlocks.push(`<pre><code>${escHtml(code.trimEnd())}</code></pre>`);
      return `\x00CB${codeBlocks.length-1}\x00`;
    });
    html = html
      .replace(/^#### (.+)$/gm, '<h4>$1</h4>')
      .replace(/^### (.+)$/gm, '<h3>$1</h3>')
      .replace(/^## (.+)$/gm, (_, t) => `<h2 id="toc-${t.replace(/[^a-zA-Z0-9]/g,'-').toLowerCase()}">${t}</h2>`)
      .replace(/^# (.+)$/gm, '<h1>$1</h1>')
      .replace(/^---+$/gm, '<hr>')
      .replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>')
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
      .replace(/(?<!\w)\*(.+?)\*(?!\w)/g, '<em>$1</em>')
      .replace(/`([^`]+)`/g, (_, c) => `<code>${escHtml(c)}</code>`)
      // Sergeant Focus
      .replace(/(^>\s+\*\*Sergeant Focus:\*\*.+(?:\n>\s+.+)*)/gm, (block) => {
        const text = block.split('\n').map(l => l.replace(/^>\s+/,'')).join(' ').replace(/\*\*Sergeant Focus:\*\*\s*/,'');
        return `<div class="callout-sergeant">${text}</div>`;
      })
      // Exam Alert
      .replace(/(^>\s+\*\*Exam Alert:\*\*.+(?:\n>\s+.+)*)/gm, (block) => {
        const text = block.split('\n').map(l => l.replace(/^>\s+/,'')).join(' ').replace(/\*\*Exam Alert:\*\*\s*/,'');
        return `<div class="callout-exam">${text}</div>`;
      })
      // Memory Aid
      .replace(/(^>\s+\*\*Memory Aid[^*]*\*\*.+(?:\n>\s+.+)*)/gm, (block) => {
        const text = block.split('\n').map(l => l.replace(/^>\s+/,'')).join(' ');
        return `<div class="callout-memory">${text}</div>`;
      })
      // Prior Test
      .replace(/(^>\s+\*\*Prior Test:\*\*.+(?:\n>\s+.+)*)/gm, (block) => {
        const text = block.split('\n').map(l => l.replace(/^>\s+/,'')).join(' ').replace(/\*\*Prior Test:\*\*\s*/,'');
        return `<div class="callout-prior">${text}</div>`;
      })
      // PG Conflict
      .replace(/(^>\s+\*\*PG Conflict:\*\*.+(?:\n>\s+.+)*)/gm, (block) => {
        const text = block.split('\n').map(l => l.replace(/^>\s+/,'')).join(' ').replace(/\*\*PG Conflict:\*\*\s*/,'');
        return `<div class="callout-conflict">${text}</div>`;
      })
      // See Also
      .replace(/(^>\s+\*\*See Also:\*\*.+(?:\n>\s+.+)*)/gm, (block) => {
        const text = block.split('\n').map(l => l.replace(/^>\s+/,'')).join(' ').replace(/\*\*See Also:\*\*\s*/,'');
        return `<div class="callout-seealso">${text}</div>`;
      })
      // Blockquotes
      .replace(/(^>\s+.+\n?)+/gm, (block) => {
        const lines = block.split('\n').map(l => l.replace(/^>\s+/,'')).filter(l => l);
        return `<blockquote>${lines.join('<br>')}</blockquote>`;
      })
      // Tables
      .replace(/^(\|.+\|)\n(\|[-|: ]+\|)\n((?:\|.+\|\n?)+)/gm, (_, hdr, sep, body) => {
        const ths = hdr.split('|').filter(c=>c.trim()).map(c=>`<th>${c.trim()}</th>`).join('');
        const rows = body.trim().split('\n').map(r => {
          const tds = r.split('|').filter(c=>c.trim()).map(c=>`<td>${c.trim()}</td>`).join('');
          return `<tr>${tds}</tr>`;
        }).join('');
        return `<table><thead><tr>${ths}</tr></thead><tbody>${rows}</tbody></table>`;
      })
      .replace(/((?:^\d+\.\s+.+\n?)+)/gm, (block) => {
        const items = block.trim().split('\n').map(l=>`<li>${l.replace(/^\d+\.\s+/,'')}</li>`).join('');
        return `<ol>${items}</ol>`;
      })
      .replace(/((?:^- .+\n?)+)/gm, (block) => {
        const items = block.trim().split('\n').map(l=>`<li>${l.replace(/^- /,'')}</li>`).join('');
        return `<ul>${items}</ul>`;
      })
      .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>')
      .replace(/<details>\s*\n?\s*<summary>(.*?)<\/summary>/g, '</p><details><summary>$1</summary><div>')
      .replace(/<\/details>/g, '</div></details><p>')
      .replace(/\n{2,}/g, '</p><p>');
    html = html.replace(/\x00CB(\d+)\x00/g, (_, i) => codeBlocks[i]);
    return `<div class="md-content"><p>${html}</p></div>`;
  }

  // ── Build chapter TOC ──
  function buildChapterTOC(md) {
    const headings = [];
    const re = /^(#{2,3})\s+(.+)$/gm;
    let m;
    while ((m = re.exec(md)) !== null) {
      headings.push({ level: m[1].length, text: m[2], id: 'toc-' + m[2].replace(/[^a-zA-Z0-9]/g, '-').toLowerCase() });
    }
    if (headings.length < 3) return '';
    return `<div class="chapter-toc"><div class="chapter-toc-title">Contents</div>${headings.map(h =>
      `<a class="${h.level>2?'indent':''}" onclick="document.getElementById('${h.id}')?.scrollIntoView({behavior:'smooth'})">${h.text}</a>`
    ).join('')}</div>`;
  }

  // ── Helpers ──
  function shuffle(a) { const b=[...a]; for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];} return b; }
  function getChapterStats(chId) {
    const s = progress[`quiz_${chId}`];
    if (!s?.answers) return null;
    const a = Object.values(s.answers);
    const t = a.length, c = a.filter(x=>x.correct).length;
    return { total: t, correct: c, pct: t > 0 ? Math.round(c/t*100) : 0 };
  }
  function formatTime(secs) { const m = Math.floor(secs/60); return m < 60 ? `${m}m` : `${Math.floor(m/60)}h ${m%60}m`; }

  // ── Readiness score ──
  function getReadiness() {
    const totalCh = D.chapters.length;
    if (totalCh === 0) return 0;
    const readPct = Object.keys(chaptersRead).length / totalCh;
    const quizScores = D.chapters.map(ch => getChapterStats(ch.id)).filter(Boolean);
    const quizPct = quizScores.length > 0 ? quizScores.reduce((s,q)=>s+q.pct,0) / quizScores.length / 100 : 0;
    const chaptersWithMC = D.chapters.filter(c=>c.questions.some(q=>q.type==='mc')).length;
    const quizCoverage = chaptersWithMC > 0 ? quizScores.length / chaptersWithMC : 0;
    const examBest = examHistory.length > 0 ? Math.max(...examHistory.map(h=>h.pct)) / 100 : 0;
    return Math.round((readPct * 20 + quizPct * 30 + quizCoverage * 20 + examBest * 30));
  }

  // ── Spaced repetition ──
  function getSRBox(chId, qNum) { return (progress[`sr_${chId}`] || {})[qNum] || { box: 0, next: 0 }; }
  function updateSR(chId, qNum, correct) {
    const key = `sr_${chId}`;
    const sr = progress[key] || {};
    const cur = sr[qNum] || { box: 0, next: 0 };
    const intervals = [0, 1, 3, 7, 14, 30]; // days
    if (correct) cur.box = Math.min(5, cur.box + 1);
    else cur.box = Math.max(0, cur.box - 1);
    cur.next = Date.now() + intervals[cur.box] * 86400000;
    sr[qNum] = cur;
    progress[key] = sr;
    save('nypd_progress', progress);
  }
  function getDueQuestions(chId) {
    const sr = progress[`sr_${chId}`] || {};
    const now = Date.now();
    return Object.entries(sr).filter(([_, v]) => v.next <= now).map(([k]) => parseInt(k));
  }

  // ── Recently viewed ──
  function addRecent(chId) {
    recentChapters = [chId, ...recentChapters.filter(c => c !== chId)].slice(0, 5);
    save('nypd_recent', recentChapters);
  }

  // ── Confetti ──
  function fireConfetti() {
    const canvas = document.getElementById('confetti-canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    const particles = Array.from({length: 120}, () => ({
      x: Math.random() * canvas.width, y: -20,
      vx: (Math.random() - 0.5) * 8, vy: Math.random() * 6 + 4,
      w: Math.random() * 8 + 4, h: Math.random() * 6 + 2,
      rot: Math.random() * Math.PI * 2, vr: (Math.random() - 0.5) * 0.2,
      color: ['#000','#333','#666','#999','#ccc'][Math.floor(Math.random()*5)],
      life: 1
    }));
    let frame = 0;
    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      let alive = false;
      for (const p of particles) {
        if (p.life <= 0) continue;
        alive = true;
        p.x += p.vx; p.y += p.vy; p.vy += 0.15; p.rot += p.vr;
        p.life -= 0.008;
        ctx.save();
        ctx.translate(p.x, p.y); ctx.rotate(p.rot);
        ctx.globalAlpha = p.life;
        ctx.fillStyle = p.color;
        ctx.fillRect(-p.w/2, -p.h/2, p.w, p.h);
        ctx.restore();
      }
      if (alive && frame < 180) { frame++; requestAnimationFrame(draw); }
      else ctx.clearRect(0, 0, canvas.width, canvas.height);
    }
    draw();
  }

        </div>

      </div>

        ${streakDays.map(d => `<div class="streak-day ${d.active?'active':''} ${d.today?'today':''}" title="${d.key}">${d.label}</div>`).join('')}
      </div>

      <hr>
      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:1rem;margin:2rem 0;">
        <div class="score-card">
          <div class="readiness-ring">
            <svg viewBox="0 0 140 140" width="140" height="140">
              <circle cx="70" cy="70" r="60" fill="none" stroke="var(--bg-selected)" stroke-width="8"/>
              <circle cx="70" cy="70" r="60" fill="none" stroke="var(--fg)" stroke-width="8"
                stroke-dasharray="${readiness * 3.77} ${377 - readiness * 3.77}"
                stroke-linecap="butt"/>
            </svg>
            <div class="ring-text"><div class="ring-num">${readiness}</div><div class="ring-label">Readiness</div></div>
          </div>
        </div>
        <div class="score-card">
          <div class="score-num">${chapDone}/${D.chapters.length}</div>
          <div class="score-label">Chapters Read</div>
          <div class="progress-track" style="margin-top:0.8rem;"><div class="progress-fill" style="width:${chapDone/D.chapters.length*100}%"></div></div>
        </div>
        <div class="score-card">
          <div class="score-num">${examHistory.length}</div>
          <div class="score-label">Exams Taken</div>
        </div>
      </div>

      ${recentChapters.length > 0 ? `<h3>Recently Viewed</h3><div class="recent-list">${recentChapters.map(id => {
        const ch = D.chapters.find(c => c.id === id);
        return ch ? `<div class="recent-chip" onclick="App.nav('chapter/${id}')">${ch.sectionNum} ${ch.title}</div>` : '';
      }).join('')}</div>` : ''}

      ${recentChapters.length > 0 ? `<button class="continue-btn" onclick="App.nav('chapter/'+recentChapters[0])">\u25B6 Continue: ${D.chapters.find(c => c.id === recentChapters[0])?.sectionNum} ${D.chapters.find(c => c.id === recentChapters[0])?.title}</button>` : ''}

      <div style="margin:1.5rem 0;">
        <button class="btn primary" onclick="App.nav('quickquiz')">Quick Quiz \u2014 10 Random Questions</button>
      </div>

      ${examHistory.length >= 2 ? `<h2>Score Trend</h2>${renderTrendChart()}` : ''}
      ${examHistory.length > 0 ? `<h2>Exam History</h2>${examHistory.slice(-10).reverse().map(h => `
        <div class="history-row">
          <span class="history-date">${new Date(h.date).toLocaleDateString()}</span>
          <span style="font-family:var(--font-mono);font-size:0.6rem;opacity:0.5;">${h.type==='custom'?'CUSTOM':'FULL'}</span>
          <span class="history-score">${h.pct}%</span>
          <div class="history-bar"><div class="history-bar-fill" style="width:${h.pct}%"></div></div>
          <span style="font-family:var(--font-mono);font-size:0.7rem;opacity:0.5;">${h.correct}/${h.total} \u00b7 ${h.minutes}m</span>
        </div>`).join('')}` : ''}
      <hr>
      <h2>Chapters</h2>
      <table><thead><tr><th></th><th>Section</th><th>Title</th><th>Quiz</th><th>Time</th></tr></thead><tbody>
      ${D.chapters.map(ch => {
        const mc = ch.questions.filter(q=>q.type==='mc').length;
        const stats = getChapterStats(ch.id);
        const isRead = chaptersRead[ch.id];
        const t = timeTrack[ch.id];
        return `<tr style="cursor:pointer" onclick="App.nav('chapter/${ch.id}')">
          <td style="text-align:center;">${isRead?'\u2713':''}</td>
          <td><strong>${ch.sectionNum}</strong></td><td>${ch.title}</td>
          <td style="font-family:var(--font-mono);font-size:0.8rem;">${stats?`${stats.pct}%`:(mc?`${mc}Q`:'\u2014')}</td>
          <td style="font-family:var(--font-mono);font-size:0.7rem;opacity:0.5;">${t?formatTime(t):''}</td>
        </tr>`;
      }).join('')}
      </tbody></table>
    `;
  }

  // ── Trend chart ──
  function renderTrendChart() {
    if (examHistory.length < 2) return '';
    const recent = examHistory.slice(-15);
    const w = 500, h = 100, pad = 25;
    const xStep = (w - pad * 2) / (recent.length - 1);
    const points = recent.map((e, i) => ({ x: pad + i * xStep, y: h - pad - (e.pct / 100) * (h - pad * 2) }));
    const path = points.map((p, i) => `${i === 0 ? 'M' : 'L'}${p.x},${p.y}`).join(' ');
    return `<div class="trend-chart"><svg viewBox="0 0 ${w} ${h}">
      <line x1="${pad}" y1="${h-pad}" x2="${w-pad}" y2="${h-pad}" stroke="var(--bg-selected)" stroke-width="1"/>
      <text x="${pad-5}" y="${h-pad+3}" class="axis-label" text-anchor="end">0%</text>
      <text x="${pad-5}" y="${pad+3}" class="axis-label" text-anchor="end">100%</text>
      <path d="${path}" class="trend-line"/>
      ${points.map((p, i) => `<circle cx="${p.x}" cy="${p.y}" r="3" class="trend-dot"><title>${recent[i].pct}% — ${new Date(recent[i].date).toLocaleDateString()}</title></circle>`).join('')}
    </svg></div>`;
  }

  // ── Chapter view ──
  function showChapter(id, tab) {
    currentChapter = D.chapters.find(c => c.id === id);
    if (!currentChapter) return;
    currentView = 'chapter';
    currentTab = tab || currentTab || 'study';
    setActiveNav(id);
    addRecent(id);
    startTimeTrack(id);
    // Show chapter jump dropdown in chapter view
    const jumpSelect = document.getElementById('chapter-jump');
    if (jumpSelect) {
      jumpSelect.style.display = currentView === 'chapter' ? 'block' : 'none';
      jumpSelect.value = id;
    }

    const mc = currentChapter.questions.filter(q => q.type === 'mc');
    const open = currentChapter.questions.filter(q => q.type === 'open');
    const tabs = [{ id: 'study', label: 'Study' }];
    if (currentChapter.keyTerms) tabs.push({ id: 'terms', label: 'Key Terms' }, { id: 'flash', label: 'Flashcards' });
    if (mc.length > 0) tabs.push({ id: 'quiz', label: `Quiz (${mc.length})` });
    if (open.length > 0) tabs.push({ id: 'open', label: `Review (${open.length})` });
    if (!tabs.some(t => t.id === currentTab)) currentTab = 'study';

    tabBar.innerHTML = tabs.map(t =>
      `<button class="tab${t.id===currentTab?' active':''}" data-tab="${t.id}" onclick="App.setTab('${t.id}')">${t.label}</button>`
    ).join('');

    setBreadcrumbs(
      { label: 'Dashboard', action: "App.nav('home')" },
      { label: `${currentChapter.sectionNum} ${currentChapter.title}` },
      { label: currentTab.toUpperCase() }
    );

    fadeIn(() => { scrollTop(); renderChapterTab(); });
  }

  function setTab(tab) {
    currentTab = tab;
    if (currentChapter) location.hash = `chapter/${currentChapter.id}/${tab}`;
  }

  function renderChapterTab() {
    const ch = currentChapter;
    if (!ch) return;
    const idx = D.chapters.indexOf(ch);
    const prevCh = idx > 0 ? D.chapters[idx-1] : null;
    const nextCh = idx < D.chapters.length-1 ? D.chapters[idx+1] : null;
    const navBottom = `<div class="chapter-nav-bottom">
      <button class="chapter-nav-btn ${prevCh?'':'disabled'}" onclick="${prevCh?`App.nav('chapter/${prevCh.id}')`:''}">\u2190 ${prevCh?prevCh.title:''}  </button>
      <button class="chapter-nav-btn ${nextCh?'':'disabled'}" onclick="${nextCh?`App.nav('chapter/${nextCh.id}')`:''}">${nextCh?nextCh.title:''} \u2192</button>
    </div>`;

    // Cross-references
    const xrefs = (XREF[ch.id] || []).map(id => D.chapters.find(c=>c.id===id)).filter(Boolean);
    const xrefHtml = xrefs.length > 0 ? `<div style="margin-top:1.5rem;"><div style="font-family:var(--font-mono);font-size:0.6rem;letter-spacing:0.15em;opacity:0.4;text-transform:uppercase;margin-bottom:0.4rem;">Related Chapters</div><div class="recent-list">${xrefs.map(c=>`<div class="recent-chip" onclick="App.nav('chapter/${c.id}')">${c.sectionNum} ${c.title}</div>`).join('')}</div></div>` : '';

    // Mnemonics
    const mnems = MNEMONICS[ch.id] || [];
    const mnemHtml = mnems.length > 0 ? mnems.map(m => `<div class="mnemonic-box"><div class="mnemonic-label">Memory Aid</div><div class="mnemonic-text">${m.title}</div><p style="margin-top:0.5rem;font-size:0.85rem;">${m.text}</p></div>`).join('') : '';

    if (currentTab === 'study') {
      const isRead = chaptersRead[ch.id];
      let md = ch.readme + '\n\n---\n\n';
      ch.sections.forEach(s => { md += s.content + '\n\n---\n\n'; });
      const toc = buildChapterTOC(md);
      // Make TOC sticky if present
      const tocWithSticky = toc ? toc.replace('class="chapter-toc"', 'class="chapter-toc sticky"') : '';
      content.innerHTML = `
        <div style="display:flex;align-items:center;gap:1rem;margin-bottom:1.5rem;">
          <button class="btn ${isRead?'primary':''}" onclick="App.toggleRead('${ch.id}')">${isRead?'\u2713 MARKED AS READ':'MARK AS READ'}</button>
          ${timeTrack[ch.id]?`<span style="font-family:var(--font-mono);font-size:0.65rem;opacity:0.4;">${formatTime(timeTrack[ch.id])} spent</span>`:''}
        </div>
        ${mnemHtml}${tocWithSticky}${renderMd(md)}${xrefHtml}${navBottom}`;
      // Show context-aware bottom nav for chapter navigation
      showContextBottomNav(prevCh, nextCh);
    } else if (currentTab === 'terms') {
      content.innerHTML = renderMd(ch.keyTerms) + xrefHtml + navBottom;
    } else if (currentTab === 'flash') {
      renderFlashcards(ch); return;
    } else if (currentTab === 'quiz') {
      renderQuiz(ch.questions.filter(q=>q.type==='mc'), ch.id); return;
    } else if (currentTab === 'open') {
      renderOpenQuestions(ch.questions.filter(q=>q.type==='open'));
      content.innerHTML += navBottom;
    }
  }

  function toggleRead(chId) {
    if (chaptersRead[chId]) delete chaptersRead[chId];
    else chaptersRead[chId] = Date.now();
    save('nypd_chapters_read', chaptersRead);
    buildNav(); setActiveNav(chId);
    renderChapterTab();
  }

  // ── Flashcards ──
  function renderFlashcards(ch) {
    const terms = [];
    for (const line of (ch.keyTerms||'').split('\n')) {
      const t = line.match(/\|\s*\*\*(.+?)\*\*\s*\|\s*(.+?)\s*\|/) || line.match(/^\*\*(.+?)\*\*\s*[:\u2014\u2013-]\s*(.+)/) || line.match(/^-\s*\*\*(.+?)\*\*[:\s]+(.+)/);
      if (t) terms.push({ term: t[1], def: t[2] });
    }
    if (terms.length === 0) { content.innerHTML = '<h1>Flashcards</h1><p>No terms found.</p>'; return; }
    content.innerHTML = `
      <div class="quiz-header"><div><h1>Flashcards</h1><p style="font-family:var(--font-mono);font-size:0.7rem;opacity:0.5;">${ch.sectionNum} \u2014 ${terms.length} cards</p></div>
      <button class="btn" onclick="App.shuffleFlashcards()">Shuffle</button></div>
      <p style="font-size:0.8rem;opacity:0.5;">Click to flip.</p>
      <div class="flashcard-grid" id="fc-grid">${terms.map((t,i)=>`
        <div class="flashcard" onclick="this.classList.toggle('flipped')"><div class="flashcard-inner">
          <div class="flashcard-front"><div class="flashcard-label">Term ${i+1}</div>${escHtml(t.term)}</div>
          <div class="flashcard-back"><div class="flashcard-label">Definition</div>${escHtml(t.def)}</div>
        </div></div>`).join('')}</div>`;
  }
  function shuffleFlashcards() {
    const g = document.getElementById('fc-grid');
    if (!g) return;
    const cards = shuffle([...g.children]);
    g.innerHTML = '';
    cards.forEach(c => { c.classList.remove('flipped'); g.appendChild(c); });
  }

  // ── Quiz ──
  let quizQStartTime = Date.now();
  function renderQuiz(qs, chId) {
    quizQStartTime = Date.now();
    const key = `quiz_${chId}`;
    const state = progress[key] || { answers: {} };
    const dueNums = getDueQuestions(chId);

    let filtered = [...qs];
    if (quizFilter === 'unanswered') filtered = filtered.filter(q => !state.answers[q.number]);
    else if (quizFilter === 'wrong') filtered = filtered.filter(q => state.answers[q.number] && !state.answers[q.number].correct);
    else if (quizFilter === 'flagged') filtered = filtered.filter(q => bookmarks[`${chId}_${q.number}`]);
    else if (quizFilter === 'due') filtered = filtered.filter(q => dueNums.includes(q.number));
    if (quizShuffle) filtered = shuffle(filtered);

    const allA = Object.keys(state.answers).length;
    const allC = Object.values(state.answers).filter(a=>a.correct).length;

    content.innerHTML = `
      <div class="quiz-header"><div><h1>Chapter Quiz</h1><p style="font-family:var(--font-mono);font-size:0.7rem;opacity:0.5;">${currentChapter.sectionNum} \u2014 ${currentChapter.title}</p></div>
      <div class="quiz-stats"><div>${allA}/${qs.length} answered</div>${allA>0?`<div>${allC}/${allA} correct (${Math.round(allC/allA*100)}%)</div>`:''}</div></div>
      ${allA>0&&qs.length>0?`<div class="progress-track"><div class="progress-fill" style="width:${allA/qs.length*100}%"></div></div>`:''}
      <div class="quiz-toolbar">
        <button class="btn" onclick="App.resetQuiz('${chId}')">Reset</button>
        <button class="filter-btn ${quizFilter==='all'?'active':''}" onclick="App.setQF('all','${chId}')">All (${qs.length})</button>
        <button class="filter-btn ${quizFilter==='unanswered'?'active':''}" onclick="App.setQF('unanswered','${chId}')">Unanswered</button>
        <button class="filter-btn ${quizFilter==='wrong'?'active':''}" onclick="App.setQF('wrong','${chId}')">Incorrect</button>
        <button class="filter-btn ${quizFilter==='flagged'?'active':''}" onclick="App.setQF('flagged','${chId}')">Flagged</button>
        <button class="filter-btn ${quizFilter==='due'?'active':''}" onclick="App.setQF('due','${chId}')">Due (${dueNums.length})</button>
        <label style="font-family:var(--font-mono);font-size:0.65rem;display:flex;align-items:center;gap:0.3rem;cursor:pointer;"><input type="checkbox" ${quizShuffle?'checked':''} onchange="App.toggleShuffle('${chId}')"> SHUFFLE</label>
      </div>
      ${filtered.length===0?'<p style="opacity:0.5;">No questions match this filter.</p>':''}
      ${filtered.map((q,i) => {
        const ans = state.answers[q.number];
        const revealed = !!ans;
        const flagged = bookmarks[`${chId}_${q.number}`];
        const sr = getSRBox(chId, q.number);
        const responseTime = ans?.time && ans?.startTime ? Math.round((ans.time - ans.startTime)/1000) : null;
        return `<div class="question-card" id="qc-${q.number}">
          <div class="question-top">
            <div class="question-num">Question ${q.number}${sr.box>0?` \u2014 Box ${sr.box}/5`:''}${responseTime?`<span class="q-time">${responseTime}s</span>`:''}</div>
            <button class="bookmark-btn ${flagged?'flagged':''}" onclick="App.toggleBM('${chId}',${q.number})" title="Flag">\u2691</button>
          </div>
          <div class="question-text">${escHtml(q.text)}</div>
          ${q.options.map(opt => {
            const l = opt.charAt(0);
            let cls = 'option';
            if (revealed) { if (l===q.answer) cls+=' correct'; else if (l===ans?.selected) cls+=' wrong'; }
            return `<button class="${cls}" onclick="App.answer('${chId}',${q.number},'${l}')" ${revealed?'disabled':''}>${escHtml(opt)}</button>`;
          }).join('')}
          <div class="explanation ${revealed?'visible':''}" id="exp-${q.number}">
            <div class="answer-label">Answer: ${q.answer}</div><p>${escHtml(q.explanation)}</p>
          </div>
        </div>`;
      }).join('')}`;
  }

  function answer(chId, qNum, letter) {
    const key = `quiz_${chId}`;
    const state = progress[key] || { answers: {} };
    if (state.answers[qNum]) return;
    const q = currentChapter.questions.find(q => q.number === qNum);
    const correct = letter === q.answer;
    state.answers[qNum] = { selected: letter, correct, time: Date.now(), startTime: quizQStartTime };
    progress[key] = state;
    updateSR(chId, qNum, correct);
    logStudy();
    save('nypd_progress', progress);
    renderQuiz(currentChapter.questions.filter(q=>q.type==='mc'), chId);
  }

  function resetQuiz(chId) { delete progress[`quiz_${chId}`]; quizFilter='all'; save('nypd_progress',progress); renderQuiz(currentChapter.questions.filter(q=>q.type==='mc'),chId); }
  function setQF(f,chId) { quizFilter=f; renderQuiz(currentChapter.questions.filter(q=>q.type==='mc'),chId); }
  function toggleShuffle(chId) { quizShuffle=!quizShuffle; renderQuiz(currentChapter.questions.filter(q=>q.type==='mc'),chId); }
  function toggleBM(chId,qNum) {
    const k=`${chId}_${qNum}`;
    if (bookmarks[k]) delete bookmarks[k]; else bookmarks[k]=true;
    save('nypd_bookmarks',bookmarks);
    const card = document.getElementById(`qc-${qNum}`);
    if (card) card.querySelector('.bookmark-btn').classList.toggle('flagged', !!bookmarks[k]);
  }

  // ── Open questions ──
  function renderOpenQuestions(qs) {
    content.innerHTML = `
      <div class="quiz-header"><div><h1>Review Questions</h1><p style="font-family:var(--font-mono);font-size:0.7rem;opacity:0.5;">Open-ended \u2014 ${currentChapter.sectionNum} \u2014 ${currentChapter.title}</p></div></div>
      ${qs.map(q=>`<div class="question-card"><div class="question-num">Question ${q.number}</div>
        <div class="question-text">${escHtml(q.text)}</div>
        <button class="open-answer-toggle" onclick="this.nextElementSibling.classList.toggle('visible');this.textContent=this.textContent==='Show Answer'?'Hide Answer':'Show Answer'">Show Answer</button>
        <div class="explanation"><p>${escHtml(q.explanation)}</p></div>
      </div>`).join('')}`;
  }

  // ── Quick Quiz (10 random) ──
  function showQuickQuiz() {
    tabBar.innerHTML = '';
    setBreadcrumbs({ label: 'Dashboard', action: "App.nav('home')" }, { label: 'Quick Quiz' });
    const pool = [];
    D.chapters.forEach(ch => ch.questions.filter(q=>q.type==='mc').forEach(q => pool.push({...q, chId: ch.id, chNum: ch.sectionNum})));
    const qs = shuffle(pool).slice(0, 10).map((q,i) => ({...q, number: i+1, _orig: q.number}));
    const state = { answers: {} };

    content.innerHTML = `
      <div class="quiz-header"><div><h1>Quick Quiz</h1><p style="font-family:var(--font-mono);font-size:0.7rem;opacity:0.5;">10 Random Questions</p></div>
      <div class="quiz-stats" id="qq-stats">0/10 answered</div></div>
      <div id="qq-cards">${qs.map(q => `
        <div class="question-card" id="qq-${q.number}">
          <div class="question-top"><div class="question-num">Question ${q.number} <span class="q-time">Section ${q.chNum}</span></div></div>
          <div class="question-text">${escHtml(q.text)}</div>
          ${q.options.map(opt => {
            const l = opt.charAt(0);
            return `<button class="option" onclick="App.qqAnswer(${q.number},'${l}')">${escHtml(opt)}</button>`;
          }).join('')}
          <div class="explanation" id="qqexp-${q.number}"><div class="answer-label">Answer: ${q.answer}</div><p>${escHtml(q.explanation)}</p></div>
        </div>
      `).join('')}</div>`;

    window._qqState = { qs, answers: {} };
  }

  function qqAnswer(num, letter) {
    const st = window._qqState;
    if (!st || st.answers[num]) return;
    const q = st.qs.find(q=>q.number===num);
    const correct = letter === q.answer;
    st.answers[num] = { selected: letter, correct };
    logStudy();
    const card = document.getElementById(`qq-${num}`);
    card.querySelectorAll('.option').forEach(o => {
      const l = o.textContent.charAt(0);
      if (l === q.answer) o.classList.add('correct');
      else if (l === letter && !correct) o.classList.add('wrong');
      o.disabled = true;
    });
    document.getElementById(`qqexp-${num}`).classList.add('visible');
    const answered = Object.keys(st.answers).length;
    document.getElementById('qq-stats').textContent = `${answered}/10 answered — ${Object.values(st.answers).filter(a=>a.correct).length} correct`;
    if (answered === 10 && Object.values(st.answers).filter(a=>a.correct).length >= 9) fireConfetti();
  }

  // ── Cheat Sheet ──
  function showCheatSheet() {
    tabBar.innerHTML = '';
    setBreadcrumbs({ label: 'Dashboard', action: "App.nav('home')" }, { label: 'Cheat Sheet' });
    content.innerHTML = `<div class="cheat-sheet">${renderMd(D.cheatSheet)}</div>`;
  }

  // ── Sergeant Focus ──
  function showSergeantFocus() {
    tabBar.innerHTML = '';
    setBreadcrumbs({ label: 'Dashboard', action: "App.nav('home')" }, { label: 'Sergeant Focus' });
    const categories = window.SERGEANT_CATEGORIES || [];
    const chapMap = {};
    D.chapters.forEach(ch => { chapMap[ch.id] = ch; });
    let html = `<div class="view-header"><h2>Sergeant Focus & Relevance</h2><p>Every supervisor duty — organized by category</p></div><div class="sf-categories">`;
    categories.forEach(cat => {
      const callouts = [];
      cat.chapters.forEach(cid => {
        const ch = chapMap[cid];
        if (ch && ch.sergeantFocus) callouts.push(...ch.sergeantFocus);
      });
      if (callouts.length === 0) return;
      html += `<div class="sf-category">
        <div class="sf-cat-header" onclick="this.parentElement.classList.toggle('open')">
          <span>${cat.label}</span><span class="sf-count">${callouts.length}</span>
        </div>
        <div class="sf-cat-content">`;
      callouts.forEach(co => {
        html += `<div class="callout-sergeant">${co.text}</div>`;
      });
      html += `</div></div>`;
    });
    html += `</div>`;
    content.innerHTML = html;
  }

  // ═══════════════════════════
  // ── Flashcards View (PG/AG organized) ──
  // ═══════════════════════════
  let flashcardState = { filter: 'all', expanded: [], search: '' };

  function showFlashcards() {
    tabBar.innerHTML = '';
    setBreadcrumbs({ label: 'Dashboard', action: "App.nav('home')" }, { label: 'Flashcards' });

    // Build flashcard data from all sources
    const flashcards = [];

    // Key terms from all chapters
    for (const ch of D.chapters) {
      const sectionNum = ch.sectionNum;
      const guideType = parseInt(sectionNum.split('-')[0]) >= 300 ? 'A.G.' : 'P.G.';
      const procNum = `${guideType} ${sectionNum}`;

      if (ch.keyTerms) {
        const lines = ch.keyTerms.split('\n').filter(l => l.includes('|'));
        for (const line of lines) {
          const cells = line.split('|').map(c => c.trim()).filter(c => c);
          if (cells.length >= 2 && !cells[0].includes('---') && !cells[0].includes('Term')) {
            const term = cells[0].replace(/^\*\*/, '').replace(/\*\*$/, '');
            const def = cells[1];
            flashcards.push({
              type: 'keyterm',
              front: term,
              back: def,
              procedure: procNum,
              guide: guideType,
              chapter: ch.title,
              chapterId: ch.id
            });
          }
        }
      }

      // Sergeant Focus
      for (const sf of ch.sergeantFocus || []) {
        flashcards.push({
          type: 'sergeant',
          front: `SERGEANT FOCUS`,
          back: sf.text,
          procedure: procNum,
          guide: guideType,
          chapter: ch.title,
          chapterId: ch.id,
          filename: sf.filename
        });
      }

    }

    // Group by procedure
    const grouped = {};
    flashcards.forEach(fc => {
      if (!grouped[fc.procedure]) grouped[fc.procedure] = [];
      grouped[fc.procedure].push(fc);
    });

    // Filter by guide type
    let filteredGroups = grouped;
    if (flashcardState.filter !== 'all') {
      filteredGroups = {};
      Object.entries(grouped).forEach(([proc, cards]) => {
        if (flashcardState.filter === 'pg' && proc.startsWith('P.G.')) filteredGroups[proc] = cards;
        if (flashcardState.filter === 'ag' && proc.startsWith('A.G.')) filteredGroups[proc] = cards;
      });
    }

    // Apply search
    if (flashcardState.search) {
      const searchLower = flashcardState.search.toLowerCase();
      Object.entries(filteredGroups).forEach(([proc, cards]) => {
        filteredGroups[proc] = cards.filter(fc =>
          fc.front.toLowerCase().includes(searchLower) ||
          fc.back.toLowerCase().includes(searchLower) ||
          fc.chapter.toLowerCase().includes(searchLower)
        );
      });
      // Remove empty groups
      Object.keys(filteredGroups).forEach(proc => {
        if (filteredGroups[proc].length === 0) delete filteredGroups[proc];
      });
    }

    const totalCards = flashcards.length;
    const filteredCards = Object.values(filteredGroups).reduce((sum, arr) => sum + arr.length, 0);

    let html = `<div class="view-header">
      <h2>Flashcards by Procedure</h2>
      <p>Browse flashcards organized by Patrol Guide (P.G.) and Administrative Guide (A.G.) procedure numbers</p>

      <div class="flashcard-toolbar" style="margin-top:1rem;display:flex;gap:0.5rem;flex-wrap:wrap;align-items:center;">
        <input type="text" id="flashcard-search" placeholder="Search flashcards..."
          style="flex:1;min-width:200px;padding:0.5rem 0.75rem;border:1px solid var(--border);border-radius:4px;background:var(--card);color:var(--fg);"
          oninput="App.setFlashcardSearch(this.value)">
        <select onchange="App.setFlashcardFilter(this.value)" style="padding:0.5rem;border:1px solid var(--border);border-radius:4px;background:var(--card);color:var(--fg);">
          <option value="all" ${flashcardState.filter==='all'}>All Guides</option>
          <option value="pg" ${flashcardState.filter==='pg'}>Patrol Guide (P.G.)</option>
          <option value="ag" ${flashcardState.filter==='ag'}>Admin Guide (A.G.)</option>
        </select>
        <button class="btn" onclick="App.downloadAnki()">Download Anki CSVs</button>
      </div>

      <div class="flashcard-stats" style="display:flex;gap:1rem;margin:1rem 0;font-family:var(--font-mono);font-size:0.85rem;opacity:0.7;flex-wrap:wrap;">
        <span><strong>${totalCards}</strong> total cards</span>
        <span><strong>${Object.keys(filteredGroups).length}</strong> procedures</span>
        <span><strong>${filteredCards}</strong> shown</span>
      </div>

      <div class="flashcard-legend" style="display:flex;gap:1rem;margin-bottom:1rem;font-size:0.85rem;flex-wrap:wrap;">
        <span style="display:inline-flex;align-items:center;gap:0.5rem;">
          <span style="width:14px;height:14px;background:#16a34a;border:2px solid #15803d;border-radius:3px;"></span>
          <span style="font-weight:600;">📖 Key Terms</span>
        </span>
        <span style="display:inline-flex;align-items:center;gap:0.5rem;">
          <span style="width:14px;height:14px;background:#ca8a04;border:2px solid #a16207;border-radius:3px;"></span>
          <span style="font-weight:600;">★ Sergeant Focus</span>
        </span>
      </div>
    </div>

    <div class="flashcard-list" id="flashcard-list">`;

    const sortedProcs = Object.keys(filteredGroups).sort((a, b) => {
      const aNum = parseFloat(a.split(' ')[1]);
      const bNum = parseFloat(b.split(' ')[1]);
      return aNum - bNum;
    });

    sortedProcs.forEach(proc => {
      const procCards = filteredGroups[proc];
      const isOpen = flashcardState.expanded.includes(proc);
      const keyTerms = procCards.filter(c => c.type === 'keyterm').length;
      const sergeant = procCards.filter(c => c.type === 'sergeant').length;
      html += `<div class="procedure-group ${isOpen ? 'open' : ''}" data-proc="${proc.replace(/"/g, '&quot;')}">
        <div class="procedure-header" onclick="App.toggleFlashcardGroup('${proc.replace(/'/g, "\\'")}')">
          <div class="procedure-info">
            <span class="procedure-num">${proc}</span>
            <span class="procedure-chapter">${procCards[0]?.chapter || ''}</span>
          </div>
          <div class="procedure-counts">
            ${keyTerms > 0 ? `<span class="count-badge keyterm">${keyTerms} terms</span>` : ''}
            ${sergeant > 0 ? `<span class="count-badge sergeant">${sergeant} focus</span>` : ''}
            <span class="count-badge total">${procCards.length} cards</span>
          </div>
        </div>
        <div class="procedure-content">`;

      procCards.forEach((fc, idx) => {
        const cardClass = fc.type === 'keyterm' ? 'flashcard-keyterm' : fc.type === 'sergeant' ? 'flashcard-sergeant' : 'flashcard-note';
        const icon = fc.type === 'keyterm' ? '📖' : fc.type === 'sergeant' ? '★' : '📝';
        html += `<div class="flashcard-item ${cardClass}" onclick="App.flipFlashcard(this)">
          <div class="flashcard-inner">
            <div class="flashcard-front">
              <div class="flashcard-label">${icon} ${fc.front}</div>
              <div class="flashcard-text">${fc.front}</div>
              <div class="flashcard-meta">${fc.chapter} • ${fc.filename || ''}</div>
            </div>
            <div class="flashcard-back">
              <div class="flashcard-label">Answer</div>
              <div class="flashcard-answer">${fc.back}</div>
              <div class="flashcard-proc">${fc.procedure}</div>
            </div>
          </div>
        </div>`;
      });

      html += `</div></div>`;
    });

    html += `</div>`;
    content.innerHTML = html;
  }

  function setFlashcardFilter(filter) {
    flashcardState.filter = filter;
    flashcardState.expanded = [];
    showFlashcards();
  }

  function setFlashcardSearch(search) {
    flashcardState.search = search;
    flashcardState.expanded = [];
    showFlashcards();
  }

  function toggleFlashcardGroup(proc) {
    const idx = flashcardState.expanded.indexOf(proc);
    if (idx >= 0) flashcardState.expanded.splice(idx, 1);
    else flashcardState.expanded.push(proc);
    showFlashcards();
  }

  function flipFlashcard(el) {
    el.classList.toggle('flipped');
  }

  let examState = { started: false, answers: {}, startTime: null, timerInterval: null, submitted: false, questions: [] };

  function showExam() {
    tabBar.innerHTML = '';
    setBreadcrumbs({ label: 'Dashboard', action: "App.nav('home')" }, { label: 'Practice Exam' });

    if (examState.started) { renderExamQuestions(); return; }

    content.innerHTML = `
      <h1>Master Practice Exam</h1>
      <p style="font-family:var(--font-mono);font-size:0.7rem;letter-spacing:0.15em;text-transform:uppercase;opacity:0.5;margin:0.5rem 0 2rem;">Timed \u00b7 Scored</p><hr>

        <label style="font-family:var(--font-mono);font-size:0.7rem;display:flex;align-items:center;gap:0.3rem;"><input type="checkbox" id="cust-shuf" checked> SHUFFLE</label>

  function startExam(mode) {
    let qs = [];
    let type = 'full';
    if (mode === 'full') { qs = [...D.examQuestions]; }
    else {
      type = 'custom';
      const sel = [...document.querySelectorAll('#cust-ch input:checked')].map(i=>i.value);
      const pool = [];
      sel.forEach(id => { const ch=D.chapters.find(c=>c.id===id); if(ch) ch.questions.filter(q=>q.type==='mc').forEach(q=>pool.push({...q,source:ch.sectionNum})); });
      const doShuf = document.getElementById('cust-shuf')?.checked;
      const n = parseInt(document.getElementById('cust-n')?.value||'25');
      qs = doShuf ? shuffle(pool) : pool;
      if (n > 0) qs = qs.slice(0, n);
      qs = qs.map((q,i) => ({...q, number: i+1}));
    }
    if (qs.length === 0) return;
    examState = { started: true, answers: {}, startTime: Date.now(), timerInterval: null, submitted: false, questions: qs, type };
    scrollTop();
    renderExamQuestions();
  }

  function renderExamQuestions() {
    const qs = examState.questions;
    const answered = Object.keys(examState.answers).length;
    const elapsed = Math.floor((Date.now()-examState.startTime)/1000);
    const mm = String(Math.floor(elapsed/60)).padStart(2,'0');
    const ss = String(elapsed%60).padStart(2,'0');

    content.innerHTML = `
      <div class="exam-controls">
        <div class="exam-timer" id="e-timer">${mm}:${ss}</div><div style="flex:1"></div>
        <div class="quiz-stats">${answered}/${qs.length}</div>
        <button class="btn primary" onclick="App.submitExam()" ${answered===0?'disabled':''}>Submit</button>
      </div>
      <div class="progress-track"><div class="progress-fill" style="width:${answered/qs.length*100}%"></div></div>
      <div style="font-family:var(--font-mono);font-size:0.6rem;opacity:0.4;margin:0.5rem 0;">JUMP TO QUESTION</div>
      <div class="jump-grid">${qs.map(q => `<div class="jump-cell ${examState.answers[q.number]?'answered':''}" data-num="${q.number}" onclick="document.getElementById('eq-${q.number}').scrollIntoView({behavior:'smooth'})">${q.number}</div>`).join('')}</div>
      ${qs.map(q => {
        const sel = examState.answers[q.number];
        return `<div class="question-card" id="eq-${q.number}"><div class="question-num">Question ${q.number}${q.source?` \u2014 Section ${q.source}`:''}</div>
          <div class="question-text">${escHtml(q.text)}</div>
          ${q.options.map(opt => { const l=opt.charAt(0); return `<button class="option${sel===l?' selected':''}" onclick="App.examAns(${q.number},'${l}')">${escHtml(opt)}</button>`; }).join('')}
        </div>`;
      }).join('')}`;

    clearInterval(examState.timerInterval);
    examState.timerInterval = setInterval(() => {
      const el=document.getElementById('e-timer'); if(!el){clearInterval(examState.timerInterval);return;}
      const e=Math.floor((Date.now()-examState.startTime)/1000);
      el.textContent=`${String(Math.floor(e/60)).padStart(2,'0')}:${String(e%60).padStart(2,'0')}`;
    }, 1000);
  }

  function examAns(num, letter) {
    examState.answers[num] = letter;
    logStudy();
    const answered = Object.keys(examState.answers).length;
    const total = examState.questions.length;
    const s=$('.quiz-stats'); if(s) s.textContent=`${answered}/${total}`;
    const f=$('.progress-fill'); if(f) f.style.width=`${answered/total*100}%`;
    const b=$('.btn.primary'); if(b) b.disabled=false;
    const card=document.getElementById(`eq-${num}`);
    if(card) card.querySelectorAll('.option').forEach(o=>o.classList.toggle('selected',o.textContent.charAt(0)===letter));
    // Update jump grid
    const cell = $(`.jump-cell[data-num="${num}"]`);
    if(cell) cell.classList.add('answered');
  }

  function submitExam() {
    clearInterval(examState.timerInterval);
    examState.submitted = true;
    examState.elapsedSeconds = Math.floor((Date.now()-examState.startTime)/1000);
    const qs=examState.questions, total=qs.length;
    let correct=0; qs.forEach(q=>{if(examState.answers[q.number]===q.answer)correct++;});
    const pct=total>0?Math.round(correct/total*100):0;
    examHistory.push({date:new Date().toISOString(),correct,total,pct,minutes:Math.floor(examState.elapsedSeconds/60),type:examState.type||'full'});
    save('nypd_exam_history',examHistory);
    scrollTop();
    if (pct >= 90) fireConfetti();
    renderExamResults();
  }

  function renderExamResults() {
    const qs=examState.questions,total=qs.length;
    let correct=0; qs.forEach(q=>{if(examState.answers[q.number]===q.answer)correct++;});
    const pct=total>0?Math.round(correct/total*100):0;
    const elapsed=examState.elapsedSeconds||0;
    let grade='';
    if(pct>=90) grade='Outstanding'; else if(pct>=80) grade='Excellent';
    else if(pct>=70) grade='Good \u2014 Review weak areas'; else if(pct>=60) grade='Needs Improvement';
    else grade='Significant Review Needed';

    content.innerHTML = `
      <h1>Exam Results</h1>
      <div class="score-card" style="margin:2rem 0;"><div class="score-num">${pct}%</div>
        <div class="score-label">${correct} of ${total} correct \u00b7 ${Math.floor(elapsed/60)} minutes</div>
        <p style="margin-top:1rem;font-family:var(--font-display);font-size:1.1rem;">${grade}</p></div><hr>
      <div style="display:flex;gap:1rem;margin:1rem 0;flex-wrap:wrap;">
        <button class="btn" onclick="App.newExam()">New Exam</button>
        <button class="btn" onclick="App.nav('weak')">View Weak Areas</button></div>
      <h2>Review</h2>
      ${qs.map(q=>{const sel=examState.answers[q.number],ok=sel===q.answer; return `
        <div class="question-card" style="border-color:${ok?'var(--fg)':'var(--bg-selected)'};">
          <div class="question-num" style="${ok?'':'color:var(--fg-muted)'}">Q${q.number} \u2014 ${ok?'CORRECT':'INCORRECT'}</div>
          <div class="question-text">${escHtml(q.text)}</div>
          ${q.options.map(o=>{const l=o.charAt(0);let c='option';if(l===q.answer)c+=' correct';else if(l===sel&&!ok)c+=' wrong';return `<button class="${c}" disabled>${escHtml(o)}</button>`;}).join('')}
          ${q.source?`<div style="font-family:var(--font-mono);font-size:0.65rem;margin-top:0.5rem;opacity:0.5;">Source: ${q.source}</div>`:''}
        </div>`;}).join('')}`;
  }
  function newExam() { examState={started:false,answers:{},startTime:null,timerInterval:null,submitted:false,questions:[]}; showExam(); }

  function showWeakAreas() {
    tabBar.innerHTML = '';

    // Slowest questions

    D.chapters.forEach(ch => {
      const s = progress[`quiz_${ch.id}`];

      Object.entries(s.answers).forEach(([qn, a]) => {
        if (a.startTime && a.time) {
          const dur = Math.round((a.time - a.startTime) / 1000);

      ${slowQs.length>0?`<hr><h2>Slowest Responses</h2>${slowQs.slice(0,10).map(s=>`<div class="weak-card" onclick="App.nav('chapter/${s.chId}/quiz')"><div style="font-family:var(--font-mono);font-size:1.2rem;font-weight:700;min-width:3.5rem;text-align:right;">${s.dur}s</div><div class="weak-info"><div class="weak-title">${s.chNum} Q${s.qNum}</div><div class="weak-detail">${s.correct?'Correct':'Incorrect'}</div></div></div>`).join('')}`:''}
