    `;
  }

  function resetFont() { prefs.fontScale=1; save('nypd_prefs',prefs); applyPrefs(); }
  function saveGoal() { prefs.dailyGoal=parseInt(document.getElementById('goal-input')?.value||'20'); save('nypd_prefs',prefs); showSettings(); }
  function exportData() {
    const d={progress,prefs,examHistory,bookmarks,chaptersRead,studyLog,timeTrack,recentChapters,exportDate:new Date().toISOString()};
    const blob=new Blob([JSON.stringify(d,null,2)],{type:'application/json'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a'); a.href=url; a.download=`nypd-progress-${new Date().toISOString().slice(0,10)}.json`; a.click();
    URL.revokeObjectURL(url);
  }
  function importData(input) {
    const file=input.files[0]; if(!file) return;
    const r=new FileReader();
    r.onload=e=>{try{
      const d=JSON.parse(e.target.result);
      if(d.progress){progress=d.progress;save('nypd_progress',progress);}
      if(d.prefs){prefs=d.prefs;save('nypd_prefs',prefs);applyPrefs();}
      if(d.examHistory){examHistory=d.examHistory;save('nypd_exam_history',examHistory);}
      if(d.bookmarks){bookmarks=d.bookmarks;save('nypd_bookmarks',bookmarks);}
      if(d.chaptersRead){chaptersRead=d.chaptersRead;save('nypd_chapters_read',chaptersRead);}
      if(d.studyLog){studyLog=d.studyLog;save('nypd_study_log',studyLog);}
      if(d.timeTrack){timeTrack=d.timeTrack;save('nypd_time',timeTrack);}
      if(d.recentChapters&&Array.isArray(d.recentChapters)){recentChapters=d.recentChapters;save('nypd_recent',recentChapters);}
      buildNav(); showSettings(); alert('Imported!');
    }catch(err){alert('Invalid file.');}};
    r.readAsText(file); input.value='';
  }
  function clearData() {
    if(!confirm('Clear ALL progress?')) return;
    progress={}; examHistory=[]; bookmarks={}; chaptersRead={}; studyLog={}; timeTrack={}; recentChapters=[];
    ['nypd_progress','nypd_exam_history','nypd_bookmarks','nypd_chapters_read','nypd_study_log','nypd_time','nypd_recent'].forEach(k=>localStorage.removeItem(k));
    buildNav(); showSettings();
  }

  // ── Search ──
  let searchIndex = null;
  function buildSearchIndex() {
    if (searchIndex) return;
    searchIndex = [];
    D.chapters.forEach(ch => {
      searchIndex.push({ type:'chapter', chId:ch.id, title:`${ch.sectionNum} \u2014 ${ch.title}`, text:ch.readme, tab:'study' });
      ch.sections.forEach(s => { const t=s.content.match(/^#\s+(.+)/m); searchIndex.push({type:'section',chId:ch.id,title:t?t[1]:s.filename,text:s.content,tab:'study'}); });
      if (ch.keyTerms) searchIndex.push({type:'terms',chId:ch.id,title:`${ch.sectionNum} Key Terms`,text:ch.keyTerms,tab:'terms'});
      ch.questions.forEach(q => searchIndex.push({type:'question',chId:ch.id,title:`${ch.sectionNum} Q${q.number}`,text:q.text+' '+q.options.join(' ')+' '+q.explanation,tab:q.type==='mc'?'quiz':'open'}));
    });
    searchIndex.push({type:'cheatsheet',title:'Cheat Sheet',text:D.cheatSheet,tab:null});
  }
  function openSearch() {
    buildSearchIndex();
    document.getElementById('search-overlay').classList.add('visible');
    const inp=document.getElementById('search-input'); inp.value=''; inp.focus();
    document.getElementById('search-results').innerHTML='';
  }
  function closeSearch() { document.getElementById('search-overlay').classList.remove('visible'); }
  document.getElementById('search-input').addEventListener('input', function() {
    const q=this.value.trim().toLowerCase();
    const res=document.getElementById('search-results');
    if(q.length<2){res.innerHTML='';return;}
    const matches=[];
    for(const item of searchIndex){
      const idx=item.text.toLowerCase().indexOf(q);
      if(idx===-1&&!item.title.toLowerCase().includes(q)) continue;
      const cs=Math.max(0,idx-40),ce=Math.min(item.text.length,idx+q.length+80);
      let ctx=item.text.substring(cs,ce).replace(/[#*|_\n]/g,' ').replace(/\s+/g,' ');
      if(cs>0) ctx='\u2026'+ctx; if(ce<item.text.length) ctx+='\u2026';
      const re=new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`,'gi');
      ctx=ctx.replace(re,'<mark>$1</mark>');
      matches.push({...item,context:ctx});
      if(matches.length>=20) break;
    }
    res.innerHTML=matches.length===0?'<div style="padding:1rem;font-size:0.85rem;opacity:0.5;">No results.</div>'
      :matches.map(m=>`<div class="search-result" onclick="App.goResult('${m.type}','${m.chId||''}','${m.tab||''}')"><div class="search-result-title">${m.title}</div><div class="search-result-context">${m.context}</div></div>`).join('');
  });
  document.getElementById('search-overlay').addEventListener('click',function(e){if(e.target===this)closeSearch();});
  function goResult(type,chId,tab){closeSearch();if(type==='cheatsheet'){nav('cheatsheet');return;}if(chId)nav(`chapter/${chId}${tab?'/'+tab:''}`);}

  // ── Keyboard ──
  document.addEventListener('keydown', function(e) {
    if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA'||e.target.tagName==='SELECT'){if(e.key==='Escape'){closeSearch();e.preventDefault();}return;}
    if((e.ctrlKey&&e.key==='k')||(e.key==='/'&&!e.ctrlKey&&!e.metaKey)){e.preventDefault();openSearch();return;}
    if(e.key==='Escape'){if(document.getElementById('search-overlay').classList.contains('visible'))closeSearch();else if(document.getElementById('shortcuts-modal').classList.contains('visible'))closeShortcuts();else nav('home');return;}
    if(e.key==='?'){e.preventDefault();openShortcuts();return;}
    if(['1','2','3','4'].includes(e.key)){
      const letters=['A','B','C','D'];const letter=letters[parseInt(e.key)-1];
      const cards=document.querySelectorAll('.question-card');
      for(const card of cards){const opts=card.querySelectorAll('.option:not([disabled])');if(opts.length>0){const btn=[...opts].find(o=>o.textContent.charAt(0)===letter);if(btn){btn.click();break;}}}
      return;
    }
    if(e.key==='n'||e.key==='N'){navChapter(1);return;}
    if(e.key==='p'||e.key==='P'){navChapter(-1);return;}
  });
  function openShortcuts() { document.getElementById('shortcuts-modal').classList.add('visible'); }
  function closeShortcuts() { document.getElementById('shortcuts-modal').classList.remove('visible'); }
  function navChapter(dir) {
    if(!currentChapter){if(dir>0)nav('chapter/'+D.chapters[0].id);return;}
    const idx=D.chapters.indexOf(currentChapter);const next=idx+dir;
    if(next>=0&&next<D.chapters.length) nav('chapter/'+D.chapters[next].id);
  }

  // ── Swipe (mobile) — disabled, conflicts with pinch-to-zoom ──

  // ── Service Worker & PWA ──
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  }
  let deferredPrompt = null;
  window.addEventListener('beforeinstallprompt', e => { e.preventDefault(); deferredPrompt = e; });

  // ── Track time on unload ──
  window.addEventListener('beforeunload', () => { startTimeTrack(null); });

  // ── Init ──
  handleRoute();

  return {
    nav, toggleSidebar, toggleDark, adjustFont, resetFont, openSearch, closeSearch, goResult,
    openShortcuts, closeShortcuts,
    showChapter: (id) => nav('chapter/'+id), setTab,
    answer, resetQuiz, setQF, toggleShuffle, toggleBM, toggleRead,
    startExam, examAns, submitExam, newExam, shuffleFlashcards,
    exportData, importData, clearData, saveGoal,
    qqAnswer, showView: nav,
    setFlashcardFilter, setFlashcardSearch, toggleFlashcardGroup, flipFlashcard, downloadAnki,
  };
})();
</script>
</body>
</html>
